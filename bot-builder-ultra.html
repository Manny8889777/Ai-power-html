<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/><title>AI Bot Builder — Hackathon 2026</title><link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/><style>:root{--bg:#0a0e17;--surface:#141825;--surface2:#1c2333;--surface3:#242c3f;--border:rgba(255,255,255,0.06);--accent:#4f8ef7;--accent2:#7c5cfc;--green:#22d387;--red:#ff4757;--text:#e8eaf0;--muted:#7a8199;--font:'Sora',sans-serif;--body:'DM Sans',sans-serif;--r:14px}*{box-sizing:border-box;margin:0;padding:0}html,body{height:100%}body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px;overflow-x:hidden}body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(79,142,247,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(79,142,247,.02) 1px,transparent 1px);background-size:50px 50px;pointer-events:none;z-index:0}.glow{position:fixed;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(124,92,252,.05),transparent 70%);top:-200px;right:-200px;pointer-events:none;z-index:0}.container{position:relative;z-index:1;width:100%;max-width:1200px;display:flex;flex-direction:column;gap:16px}.header{display:flex;align-items:center;justify-content:space-between;padding:0 4px;flex-wrap:wrap;gap:12px}.logo{display:flex;align-items:center;gap:10px}.logo-icon{width:48px;height:48px;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}.logo-text h1{font-size:28px;font-weight:700;background:linear-gradient(90deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}.logo-text p{font-size:11px;color:var(--muted);margin-top:2px}.badge{font-size:11px;font-weight:600;padding:6px 14px;border-radius:20px;background:rgba(34,211,135,.12);color:var(--green);border:1px solid rgba(34,211,135,.3);display:flex;align-items:center;gap:6px}.badge::before{content:'';width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 2s infinite}@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}.main-grid{display:grid;grid-template-columns:280px 1fr;gap:18px}.sidebar{display:flex;flex-direction:column;gap:14px}.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px;display:flex;flex-direction:column;gap:12px}.panel-title{font-size:13px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:0.6px;opacity:.8}.bot-list{display:flex;flex-direction:column;gap:8px}.bot-item{padding:12px;border-radius:10px;border:2px solid var(--border);background:var(--surface2);color:var(--muted);font-size:13px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .25s}.bot-item:hover{border-color:var(--accent);background:rgba(79,142,247,.1)}.bot-item.active{border-color:var(--accent);background:rgba(79,142,247,.15);color:var(--accent);font-weight:600}.bot-icon{font-size:18px;flex-shrink:0}.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat-mini{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}.stat-val{font-size:18px;font-weight:700;color:var(--accent)}.stat-lbl{font-size:10px;color:var(--muted);margin-top:4px;font-weight:500}.chat-area{display:flex;flex-direction:column;gap:16px}.chat-window{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;display:flex;flex-direction:column;height:680px;box-shadow:0 16px 100px rgba(0,0,0,.35),0 0 0 1px rgba(79,142,247,.04)}.chat-header{padding:16px 20px;border-bottom:1px solid var(--border);background:var(--surface2);display:flex;align-items:center;gap:14px;flex-shrink:0}.h-avatar{width:48px;height:48px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 24px rgba(79,142,247,.25)}.h-info h3{font-size:15px;font-weight:600;color:var(--text)}.h-info p{font-size:12px;color:var(--muted);margin-top:2px}.h-actions{margin-left:auto;display:flex;gap:8px}.h-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}.h-btn:hover{background:var(--surface3);color:var(--accent)}.messages{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px;scroll-behavior:smooth}.messages::-webkit-scrollbar{width:4px}.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}.msg{display:flex;flex-direction:column;max-width:85%;animation:slideIn .3s ease}.msg.bot{align-self:flex-start}.msg.user{align-self:flex-end;align-items:flex-end}@keyframes slideIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}.bubble{padding:12px 16px;font-size:13px;line-height:1.65;font-family:var(--body);border-radius:12px;word-break:break-word}.msg.bot .bubble{background:var(--surface3);border:1px solid var(--border);color:var(--text);border-bottom-left-radius:3px}.msg.user .bubble{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-bottom-right-radius:3px}.msg-time{font-size:10px;color:var(--muted);margin-top:5px;padding:0 4px}.dots{display:flex;gap:4px;padding:5px;align-items:center}.dots span{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:bounce 1.4s infinite}.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}@keyframes bounce{0%,60%,100%{opacity:.3;transform:scale(.8)}30%{opacity:1;transform:scale(1)}}.quick-wrap{display:flex;flex-wrap:wrap;gap:6px;padding:12px 20px 8px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0;overflow-x:auto}.qbtn{font-size:12px;font-family:var(--font);padding:6px 12px;border-radius:18px;border:1px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}.qbtn:hover{border-color:var(--accent);color:var(--accent);background:rgba(79,142,247,.1)}.input-row{display:flex;gap:10px;padding:14px 20px;border-top:1px solid var(--border);background:var(--surface);flex-shrink:0}.input-row textarea{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:13px;font-family:var(--body);resize:none;outline:none;transition:border-color .2s;max-height:80px}.input-row textarea:focus{border-color:rgba(79,142,247,.6);box-shadow:0 0 8px rgba(79,142,247,.1)}.input-row textarea::placeholder{color:var(--muted)}.send-btn{width:44px;height:44px;border-radius:10px;flex-shrink:0;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;color:#fff;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s}.send-btn:hover{opacity:.9;transform:scale(1.04);box-shadow:0 8px 20px rgba(79,142,247,.3)}.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}.footer{text-align:center;font-size:11px;color:var(--muted);padding:12px}.footer a{color:var(--accent);text-decoration:none}@media(max-width:1024px){.main-grid{grid-template-columns:1fr}.sidebar{flex-direction:row;flex-wrap:wrap}.panel{flex:1;min-width:200px}.chat-window{height:600px}}@media(max-width:640px){.container{gap:12px}.main-grid{grid-template-columns:1fr}.chat-window{height:70vh}.header{flex-direction:column;align-items:flex-start;gap:8px}.logo-text h1{font-size:22px}.panel{padding:14px}.bot-list{flex-direction:row;flex-wrap:wrap;overflow-x:auto}.bot-item{flex:1;min-width:120px}.stats-grid{grid-template-columns:1fr 1fr}}</style></head><body><div class="glow"></div><div class="container"><div class="header"><div class="logo"><div class="logo-icon">🤖</div><div class="logo-text"><h1>Bot Builder</h1><p>AI Hackathon 2026</p></div></div><div class="badge">🔴 Live</div></div><div class="main-grid"><div class="sidebar"><div class="panel"><div class="panel-title">Bot Type</div><div class="bot-list"><button class="bot-item active" data-bot="sales" onclick="selectBot('sales')"><span class="bot-icon">🛍️</span> Sales</button><button class="bot-item" data-bot="support" onclick="selectBot('support')"><span class="bot-icon">🎧</span> Support</button><button class="bot-item" data-bot="care" onclick="selectBot('care')"><span class="bot-icon">💬</span> Care</button><button class="bot-item" data-bot="hr" onclick="selectBot('hr')"><span class="bot-icon">👔</span> HR</button></div></div><div class="panel"><div class="panel-title">Stats</div><div class="stats-grid"><div class="stat-mini"><div class="stat-val" id="s-msgs">0</div><div class="stat-lbl">MESSAGES</div></div><div class="stat-mini"><div class="stat-val" id="s-leads">0</div><div class="stat-lbl">LEADS</div></div><div class="stat-mini"><div class="stat-val" id="s-rate">0%</div><div class="stat-lbl">RATE</div></div><div class="stat-mini"><div class="stat-val" id="s-time">0m</div><div class="stat-lbl">TIME</div></div></div></div></div><div class="chat-area"><div class="chat-window"><div class="chat-header"><div class="h-avatar" id="h-icon">🤖</div><div class="h-info"><h3 id="h-name">Sales Assistant</h3><p id="h-sub">Powered by Claude AI</p></div><div class="h-actions"><button class="h-btn" title="Clear" onclick="clearChat()" style="cursor:pointer">🗑️</button><button class="h-btn" title="Export" onclick="exportChat()" style="cursor:pointer">💾</button></div></div><div class="messages" id="messages"></div><div class="quick-wrap" id="quick-wrap"><button class="qbtn" onclick="qs('Show products')">📦 Products</button><button class="qbtn" onclick="qs('Pricing')">💰 Price</button><button class="qbtn" onclick="qs('Discount')">🏷️ Offer</button></div><div class="input-row"><textarea id="inp" rows="1" placeholder="Type your message..."></textarea><button class="send-btn" id="sbtn" onclick="send()">➤</button></div></div></div></div><div class="footer">Built for <strong>AI Hackathon 2026</strong> — Powered by <a href="https://anthropic.com" target="_blank">Anthropic Claude</a></div></div><script>const BOTS={sales:{name:'Sales Bot',icon:'🛍️',subtitle:'Smart Sales Assistant',system:'You are a Sales Bot. Keep replies 2-3 sentences. Suggest products naturally. Use emojis. Offer 15% discount when asked. Products: Laptop ₹38,999 | Pro ₹62,499 | Phone ₹24,999 | Pro ₹42,999.'},support:{name:'Support Bot',icon:'🎧',subtitle:'Issue Resolution Expert',system:'You are a Support Bot. Be empathetic. Solve issues fast. Keep replies short. Handle: Refunds, Shipping, Returns, Technical Help.'},care:{name:'Care Bot',icon:'💬',subtitle:'Customer Care Specialist',system:'You are a Care Bot. Be friendly and warm. Remember preferences. Build loyalty. Personalize offers.'},hr:{name:'HR Bot',icon:'👔',subtitle:'Human Resources Assistant',system:'You are an HR Bot. Help with recruitment, policies, benefits, and employee queries. Be professional and helpful.'}};let currentBot='sales',history=[],msgCount=0,leadCount=0,startTime=Date.now();const msgsEl=document.getElementById('messages'),inpEl=document.getElementById('inp'),sbtnEl=document.getElementById('sbtn'),quickWrap=document.getElementById('quick-wrap');function now(){return new Date().toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}function updateStats(){document.getElementById('s-msgs').textContent=msgCount;document.getElementById('s-leads').textContent=leadCount;const rate=msgCount>0?Math.min(99,Math.round(leadCount/msgCount*300)):0;document.getElementById('s-rate').textContent=rate+'%';const elapsed=Math.floor((Date.now()-startTime)/60000);document.getElementById('s-time').textContent=elapsed+'m'}function selectBot(type){currentBot=type;const bot=BOTS[type];document.querySelectorAll('.bot-item').forEach(b=>b.classList.remove('active'));document.querySelector(`[data-bot="${type}"]`).classList.add('active');document.getElementById('h-icon').textContent=bot.icon;document.getElementById('h-name').textContent=bot.name;document.getElementById('h-sub').textContent=bot.subtitle;inpEl.placeholder=`Ask ${bot.name}...`;clearChat(false);setTimeout(()=>{addMsg(`👋 Hi! I'm your ${bot.name}. How can I help? 😊`,'bot')},300)}function addMsg(text,role,typing=false){const wrap=document.createElement('div');wrap.className='msg '+(role==='user'?'user':'bot');if(typing)wrap.id='typing-el';const bub=document.createElement('div');bub.className='bubble';if(typing){bub.innerHTML='<div class="dots"><span></span><span></span><span></span></div>';wrap.appendChild(bub)}else{bub.textContent=text;const t=document.createElement('div');t.className='msg-time';t.textContent=now();wrap.appendChild(bub);wrap.appendChild(t)}msgsEl.appendChild(wrap);msgsEl.scrollTop=msgsEl.scrollHeight}function removeTyping(){const t=document.getElementById('typing-el');if(t)t.remove()}function qs(text){inpEl.value=text;send()}inpEl.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send()}});inpEl.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,80)+'px'});async function send(){const text=inpEl.value.trim();if(!text||sbtnEl.disabled)return;inpEl.value='';inpEl.style.height='auto';addMsg(text,'user');history.push({role:'user',content:text});msgCount++;if(/order|buy|purchase|want|interested|price|discount|deliver|refund|issue|help/i.test(text)){leadCount++}updateStats();sbtnEl.disabled=true;addMsg('','bot',true);try{const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,system:BOTS[currentBot].system,messages:history})});if(!res.ok)throw new Error('API Error');const data=await res.json();const reply=data.content?.[0]?.text||'⚠️ Error. Try again!';history.push({role:'assistant',content:reply});removeTyping();addMsg(reply,'bot')}catch(err){removeTyping();addMsg('❌ Connection error. Check API key and internet.',`bot`)}sbtnEl.disabled=false;inpEl.focus()}function clearChat(ask=true){if(ask&&!confirm('Clear chat?'))return;msgsEl.innerHTML='';history=[];msgCount=0;leadCount=0;updateStats()}function exportChat(){const lines=[...msgsEl.querySelectorAll('.msg')].map(m=>{const role=m.classList.contains('user')?'You':BOTS[currentBot].name;const text=m.querySelector('.bubble')?.textContent?.trim()||'';if(!text||text.includes('●'))return null;return `[${m.querySelector('.msg-time')?.textContent}] ${role}: ${text}`}).filter(Boolean);const blob=new Blob([`${BOTS[currentBot].name} — Chat Export\nGenerated: ${new Date().toLocaleString('en-IN')}\n${'─'.repeat(50)}\n\n`+lines.join('\n')],{type:'text/plain'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=`bot-chat-${Date.now()}.txt`;a.click()}setInterval(updateStats,60000);setTimeout(()=>{addMsg(`👋 Hi! I'm your ${BOTS.sales.name}. How can I help? 😊`,'bot')},400);</script></body></html>
